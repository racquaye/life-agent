function sS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){console.error(e)}}

// Export current app data (downloads a JSON file)
function exportData(){
	try{
		const data={days:sG(K.days),bk:sG(K.bk),cfg:sG(K.cfg)};
		const a=document.createElement('a');

		document.body.appendChild(a);a.click();a.remove();
	}catch(e){alert('Export failed: '+e.message)}
}

// Import data from pasted JSON (prompts user to paste)
function importData(){
	const txt=prompt('Paste JSON backup here:');

	try{
		const d=JSON.parse(txt);

/* ═══ DATES ═══ */
function tk(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fk(n){const d=new Date();d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dD(k){const[y,m,d]=k.split('-').map(Number);const t=new Date(y,m-1,d);return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][t.getDay()]+', '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][t.getMonth()]+' '+d}
function dS(k){const p=k.split('-');return(+p[1])+'.'+(+p[2])}
function dow(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d).getDay()}
function dn(k){return['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dow(k)]}

let S={tab:'today',days:sG(K.days)||{},bkDone:sG(K.bk)||{},cfg:sG(K.cfg)||JSON.parse(JSON.stringify(DEF)),editing:false,edSec:null,addingItem:false,menuItem:null,menuDay:null,arcDay:null};
function svD(){sS(K.days,S.days)}function svB(){sS(K.bk,S.bkDone)}function svC(){sS(K.cfg,S.cfg)}

/* ═══ DAILY GEN ═══ */
function gen(key){const d=dow(key),c=S.cfg,it=[];c.daily.filter(i=>i.cat==='am').forEach(i=>it.push({...i,done:false,skip:false,src:'d'}));const ex=c.exercise[d];if(ex)it.push({id:'ex',label:ex.label,emoji:ex.emoji,done:false,skip:false,src:'ex'});if(c.commute.includes(d)){it.push({id:'comm',label:'Commute',emoji:'🚗',done:false,skip:false,src:'d'});it.push({id:'commh',label:'Commute home',emoji:'🚗',done:false,skip:false,src:'d'})}c.daily.filter(i=>i.cat==='day').forEach(i=>it.push({...i,done:false,skip:false,src:'d'}));c.weekly.filter(i=>i.dow===d).forEach(i=>it.push({...i,done:false,skip:false,src:'w'}));c.daily.filter(i=>i.cat==='pm').forEach(i=>it.push({...i,done:false,skip:false,src:'d'}));return it}
function ensDay(k){if(!S.days[k])S.days[k]={items:gen(k),media:[]};if(!S.days[k].media)S.days[k].media=[];svD()}
function regen(k){const cu=(S.days[k]?.items||[]).filter(i=>i.src==='c'||i.src==='bk');const fr=gen(k);const old=S.days[k]?.items||[];const mg=fr.map(f=>{const o=old.find(x=>x.id===f.id);return o?{...f,done:o.done,skip:o.skip||false}:f});S.days[k]={items:[...mg,...cu],media:S.days[k]?.media||[]};svD()}

/* ═══ SUGGESTIONS ═══ */
function getSug(dk){const it=S.days[dk]?.items||[];const ac=it.filter(i=>!i.skip).length;const cap=Math.max(0,(S.cfg.maxDaily||12)-ac);if(cap<=0)return[];const ids=it.map(i=>i.id);const po={high:0,med:1,low:2};return S.cfg.backlog.filter(b=>!S.bkDone[b.id]&&!ids.includes('bk-'+b.id)).sort((a,b)=>{if(a.due&&!b.due)return-1;if(!a.due&&b.due)return 1;if(a.due&&b.due&&a.due!==b.due)return a.due<b.due?-1:1;return(po[a.pri]||1)-(po[b.pri]||1)}).slice(0,Math.min(cap,5))}

/* ═══ STREAKS ═══ */
function getStreaks(){
const tracked=[{id:'pray',label:'Prayer',emoji:'🙏🏾'},{id:'ex',label:'Exercise',emoji:'🏃🏾'},{id:'meditate',label:'Meditation',emoji:'🧘🏾'},{id:'journal',label:'Journal',emoji:'📓'},{id:'diet',label:'Healthy Diet',emoji:'🥗'}];
const allDays=Object.keys(S.days).sort().reverse();
return tracked.map(t=>{
let streak=0;
for(const dk of allDays){
const items=S.days[dk]?.items||[];
const found=items.some(i=>(i.id===t.id||i.label?.toLowerCase().includes(t.label.toLowerCase().split(' ')[0]))&&i.done);
if(found)streak++;else break;
}
const total=allDays.filter(dk=>(S.days[dk]?.items||[]).some(i=>(i.id===t.id||i.label?.toLowerCase().includes(t.label.toLowerCase().split(' ')[0]))&&i.done)).length;
return{...t,streak,total,outOf:allDays.length};
});
